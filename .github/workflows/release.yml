name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test and static analysis
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          python-version: "3.14"
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run --no-sync pytest

      - name: Run Ruff
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .

      - name: Run mypy
        run: uv run --no-sync mypy src tests

      - name: Run Pyright
        run: uv run --no-sync pyright

  build-windows:
    name: Build Windows x86-64 executable
    needs: test
    runs-on: windows-2025
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          python-version: "3.14"
          enable-cache: true

      - name: Install deployment dependencies
        run: uv sync --frozen --no-default-groups --group deploy

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          $version = uv run --no-sync python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
              throw "Tag ${{ github.ref_name }} does not match project version $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build one-file executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
              throw "Could not locate an x64 Visual Studio C++ toolchain"
          }
          $devCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          $command = "`"$devCmd`" -no_logo -arch=x64 -host_arch=x64 && uv run --no-sync pyside6-deploy -c pysidedeploy.spec -f"
          & cmd.exe /d /s /c $command
          if ($LASTEXITCODE -ne 0) {
              throw "pyside6-deploy failed with exit code $LASTEXITCODE"
          }

      - name: Name and smoke-test executable
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $source = "dist\SatisfactoryRecipes.exe"
          if (-not (Test-Path $source -PathType Leaf)) {
              throw "Expected deployment output was not created: $source"
          }
          $releaseName = "SatisfactoryRecipes-v${{ steps.version.outputs.version }}-windows-x86_64.exe"
          $releasePath = Join-Path "dist" $releaseName
          Move-Item $source $releasePath
          & $releasePath --help
          if ($LASTEXITCODE -ne 0) {
              throw "Executable --help check failed with exit code $LASTEXITCODE"
          }
          & $releasePath --deployment-smoke-test
          if ($LASTEXITCODE -ne 0) {
              throw "Executable GUI smoke test failed with exit code $LASTEXITCODE"
          }
          $hash = (Get-FileHash $releasePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $releaseName" | Set-Content "dist\SHA256SUMS.txt" -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-x86_64
          path: |
            dist/SatisfactoryRecipes-v${{ steps.version.outputs.version }}-windows-x86_64.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs:
      - test
      - build-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-x86_64
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/SatisfactoryRecipes-v${{ needs.build-windows.outputs.version }}-windows-x86_64.exe" \
            "dist/SHA256SUMS.txt" \
            "THIRD_PARTY_NOTICES.md" \
            --verify-tag \
            --generate-notes
